name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm package:mac
      - run: |
          app_path="$(find release -maxdepth 2 -type d -name 'DuoduoDigitalManager.app' -print -quit)"
          test -n "$app_path"
          tar -czf release/DuoduoDigitalManager-macos-debug-app.tar.gz -C "$(dirname "$app_path")" "$(basename "$app_path")"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-debug-app
          path: release/DuoduoDigitalManager-macos-debug-app.tar.gz
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm package:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: release/*-setup.exe
          if-no-files-found: error
