name: Publish Runtime Update

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "展示给用户的更新说明"
        required: true
        type: string
      public_base_url:
        description: "更新文件公开访问目录"
        required: true
        type: string

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build runtime
        env:
          MAO_UPDATE_BASE_URL: ${{ inputs.public_base_url }}
          MAO_RELEASE_NOTES: ${{ inputs.release_notes }}
        run: pnpm build:runtime-update
      - uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ runner.os }}
          path: |
            release/runtime-duoduo-*.zip
            release/manifest-duoduo-*.json
          if-no-files-found: error

  combine:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/download-artifact@v4
        with:
          pattern: runtime-*
          path: release
          merge-multiple: true
      - name: Create feed
        env:
          MAO_UPDATE_BASE_URL: ${{ inputs.public_base_url }}
          MAO_RELEASE_NOTES: ${{ inputs.release_notes }}
        run: node scripts/create-update-feed.mjs --input release --output release/latest.json
      - uses: actions/upload-artifact@v4
        with:
          name: runtime-publish
          path: |
            release/latest.json
            release/runtime-duoduo-*.zip
            release/manifest-duoduo-*.json
