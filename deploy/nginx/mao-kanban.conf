# Copy to /etc/nginx/conf.d/mao-kanban.conf on RockyLinux.
# Replace server_name and root if your deployment path differs.

upstream mao_kanban_api {
    server 127.0.0.1:4173;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    root /opt/mao/current/dist/public;
    index kanban.html;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1024;

    location = /kanban.html {
        add_header Cache-Control "no-store";
        try_files /kanban.html @mao_node;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://mao_kanban_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri @mao_node;
    }

    location @mao_node {
        proxy_pass http://mao_kanban_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
